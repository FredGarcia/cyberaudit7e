# ============================================================
# CyberAudit7E — Nginx reverse proxy (optionnel)
#
# À utiliser avec docker-compose si on veut un reverse proxy
# devant Spring Boot (SSL termination, rate limiting, etc.)
#
# Ajout dans docker-compose.yml :
#   nginx:
#     image: nginx:alpine
#     ports: ["80:80"]
#     volumes: ["./nginx.conf:/etc/nginx/conf.d/default.conf"]
#     depends_on: [cyberaudit7e]
# ============================================================

upstream cyberaudit {
    server cyberaudit7e:8080;
}

server {
    listen 80;
    server_name localhost cyberaudit7e.local;

    # Taille max upload (pour de futurs imports CSV/PDF)
    client_max_body_size 10M;

    # Timeouts adaptés aux audits longs
    proxy_connect_timeout 30s;
    proxy_read_timeout 300s;  # 5 min pour les audits
    proxy_send_timeout 30s;

    # API Spring Boot
    location /api/ {
        proxy_pass http://cyberaudit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE Streaming (requiert des settings spécifiques)
    location /api/audits/stream {
        proxy_pass http://cyberaudit;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;  # 30 min pour le SSE
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://cyberaudit;
    }
    location /v3/api-docs {
        proxy_pass http://cyberaudit;
    }

    # H2 Console (dev only — désactiver en prod)
    location /h2-console/ {
        proxy_pass http://cyberaudit;
    }
}
