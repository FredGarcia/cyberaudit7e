##############################################
# CyberAudit7E — Profile PROD (Docker)
# PostgreSQL via Docker Compose networking
# Variables d'env injectées par docker-compose.yml
##############################################

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cyberaudit7e}
    username: ${DB_USER:audit}
    password: ${DB_PASSWORD:audit7e_s3cret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        enable_lazy_load_no_trans: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: false

# Swagger actif aussi en prod (protéger via Spring Security en vrai)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Scheduler activé en prod
cyberaudit7e:
  scheduler:
    enabled: true
    cron: "0 0 2 * * *"

logging:
  level:
    com.cyberaudit7e: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
