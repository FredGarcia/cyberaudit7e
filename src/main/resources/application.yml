##############################################
# CyberAudit7E — Configuration de base
# M6 : API REST complète + OpenAPI/Swagger
##############################################

spring:
  application:
    name: CyberAudit7E
  profiles:
    active: dev

  jackson:
    serialization:
      indent-output: true
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    async:
      timeout: 1800000  # 30 min (SSE)

# ── SpringDoc OpenAPI / Swagger UI ──
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    # Grouper par tag et trier alphabétiquement
    tags-sorter: alpha
    operations-sorter: method
    # Afficher le modèle de requête par défaut
    default-models-expand-depth: 2
    doc-expansion: list
  # Inclure les endpoints Spring Boot Actuator (si présent)
  show-actuator: false

# ── Configuration CyberAudit7E ──
cyberaudit7e:
  scheduler:
    enabled: false
    cron: "0 0 2 * * *"

logging:
  level:
    com.cyberaudit7e: INFO
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
