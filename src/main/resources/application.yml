##############################################
# CyberAudit7E — Configuration de base
# M3 : Spring Data JPA + Flyway activés
##############################################

spring:
  application:
    name: CyberAudit7E
  profiles:
    active: dev

  # Jackson : format ISO pour les dates, pas de null dans le JSON 
  jackson:
    serialization:
      indent-output: true
    default-property-inclusion: non_null

server:
  port: 8080

logging:
  level:
    com.cyberaudit7e: INFO
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
