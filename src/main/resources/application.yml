##############################################
# CyberAudit7E — Configuration de base
# M7+ : API REST + OpenAPI + Intégrations
##############################################

spring:
  application:
    name: CyberAudit7E
  profiles:
    active: dev

  jackson:
    serialization:
      indent-output: true
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    async:
      timeout: 1800000  # 30 min (SSE)

# ── SpringDoc OpenAPI / Swagger UI ──
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
    default-models-expand-depth: 2
    doc-expansion: list
  show-actuator: false

# ── Configuration CyberAudit7E ──
cyberaudit7e:
  scheduler:
    enabled: false
    cron: "0 0 2 * * *"

  integrations:

    # ── ServiceNow ──
    servicenow:
      enabled: true
      instance: ${SNOW_INSTANCE:mon-instance.service-now.com}
      auth-method: basic    # "oauth" ou "basic"
      client-id: ${SNOW_CLIENT_ID:}
      client-secret: ${SNOW_CLIENT_SECRET:}
      username: ${SNOW_USERNAME:admin}
      password: ${SNOW_PASSWORD:}
      assignment-group: "Accessibility Team"
      default-category: "Security"
      default-subcategory: "Vulnerability"
      timeout: 30

    # ── SailPoint IdentityNow ──
    sailpoint:
      enabled: true
      tenant: ${SP_TENANT:mon-tenant}
      client-id: ${SP_CLIENT_ID:}
      client-secret: ${SP_CLIENT_SECRET:}
      webhook-secret: ${SP_WEBHOOK_SECRET:}
      timeout: 30

logging:
  level:
    com.cyberaudit7e: INFO
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"