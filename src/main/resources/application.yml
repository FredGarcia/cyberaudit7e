##############################################
# CyberAudit7E — Configuration de base
# M5 : Async + Events + Scheduler
##############################################

spring:
  application:
    name: CyberAudit7E
  profiles:
    active: dev

server:
  port: 8080

  # Timeout pour les connexions SSE longue durée
  servlet:
    async:
      timeout: 1800000  # 30 minutes en ms

# ── Configuration CyberAudit7E ──
cyberaudit7e:
  scheduler:
    # Activer/désactiver les audits programmés
    enabled: false
    # Cron : tous les jours à 2h du matin
    # Format : seconde minute heure jour mois jour-semaine
    cron: "0 0 2 * * *"

logging:
  level:
    com.cyberaudit7e: INFO
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
