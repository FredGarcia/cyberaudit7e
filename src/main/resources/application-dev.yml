##############################################
# CyberAudit7E — Profile DEV
# H2 in-memory + JPA + Flyway + H2 Console
##############################################

spring:
  # ── DataSource H2 ──
  datasource:
    url: jdbc:h2:mem:cyberaudit7e;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── Console H2 (accessible sur /h2-console) ──
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # ── JPA / Hibernate ──
  jpa:
    # validate : Hibernate vérifie que les entités matchent le schéma
    # (créé par Flyway), mais ne le modifie pas
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        # Gestion du lazy loading hors transaction (POC only)
        enable_lazy_load_no_trans: true

  # ── Flyway (migrations SQL versionnées) ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.cyberaudit7e: DEBUG
    com.cyberaudit7e.service.cycle: DEBUG
    # Voir les requêtes SQL avec les paramètres
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
